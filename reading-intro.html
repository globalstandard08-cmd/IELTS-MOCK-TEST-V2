<!-- Replace the existing timer script with this -->
<script>
function updateTimer() {
    const totalMinutes = 60;
    const totalTime = totalMinutes * 60 * 1000;
    const startTime = localStorage.getItem('readingStartTime');
    const timerEl = document.getElementById('timer');

    if (!startTime) {
        timerEl.textContent = "60:00";
        return;
    }

    const now = Date.now();
    const elapsed = now - parseInt(startTime);
    const remaining = totalTime - elapsed;

    if (remaining <= 0) {
        timerEl.textContent = "00:00";
        if (!sessionStorage.getItem('alerted')) {
            alert("Time is up! You may still review and submit answers.");
            sessionStorage.setItem('alerted', 'true');
        }
        return;
    }

    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}

// Run immediately and every second
updateTimer();
setInterval(updateTimer, 1000);
</script>
