<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Listening - Part 1</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f4f6f9;
}

.header {
    background-color: #1f3a5f;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h2 {
    margin: 0;
}

.timer {
    background: white;
    color: #1f3a5f;
    padding: 8px 15px;
    border-radius: 5px;
    font-weight: bold;
}

.container {
    max-width: 1000px;
    margin: 20px auto;
    background: white;
    padding: 25px;
    border-radius: 8px;
}

.audio-box {
    margin-bottom: 25px;
}

.instructions {
    background: #eef3f8;
    padding: 15px;
    border-radius: 5px;
    margin-bottom: 20px;
}

.question {
    margin: 15px 0;
}

.question input {
    padding: 6px;
    width: 220px;
    text-transform: uppercase;
}

.nav-buttons {
    margin-top: 30px;
    text-align: right;
}

.btn {
    background: #1f3a5f;
    color: white;
    padding: 10px 18px;
    text-decoration: none;
    border-radius: 4px;
    border: none;
    cursor: pointer;
}

.btn:hover {
    background: #2e568c;
}
</style>
</head>

<body>

<div class="header">
    <h2>IELTS Listening - Part 1</h2>
    <div class="timer">30:00</div>
</div>

<div class="container">

    <div class="audio-box">
        <audio controls>
            <source src="./audio/part1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="instructions">
        <strong>Questions 1–10</strong><br>
        Complete the form below.<br>
        Write <strong>ONE WORD AND/OR A NUMBER</strong> for each answer.
    </div>

    <div class="question">
        1. Name:
        <input type="text">
    </div>

    <div class="question">
        2. Address:
        <input type="text">
    </div>

    <div class="question">
        3. Telephone:
        <input type="text">
    </div>

    <div class="question">
        4. Date:
        <input type="text">
    </div>

    <div class="question">
        5. Course:
        <input type="text">
    </div>

    <div class="nav-buttons">
        <button class="btn">Next Part →</button>
    </div>

</div>

</body>
</html>
