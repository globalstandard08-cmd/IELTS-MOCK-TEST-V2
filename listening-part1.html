<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IELTS Listening - Part 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

.header {
    background: #1f3a5f;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.container {
    max-width: 1000px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 6px;
}

.audio-box {
    margin-bottom: 20px;
}

.question {
    margin: 10px 0;
}

input {
    padding: 5px;
    width: 200px;
    text-transform: uppercase;
}

.btn {
    margin-top: 20px;
    padding: 10px 15px;
    background: #1f3a5f;
    color: white;
    border: none;
    cursor: pointer;
}

.btn:hover {
    background: #2e568c;
}

.timer {
    background: white;
    color: #1f3a5f;
    padding: 6px 12px;
    border-radius: 4px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <div>IELTS Listening - Part 1</div>
    <div class="timer">Time: 30:00</div>
</div>

<div class="container">

<div class="audio-box">
    <audio controls>
        <source src="./audio/part1.mp3" type="audio/mpeg">
    </audio>
</div>

<h3>Questions 1–5</h3>

<div class="question">
Q1: <input type="text">
</div>

<div class="question">
Q2: <input type="text">
</div>

<div class="question">
Q3: <input type="text">
</div>

<div class="question">
Q4: <input type="text">
</div>

<div class="question">
Q5: <input type="text">
</div>

<button class="btn">Next Part →</button>

</div>

</body>
</html>
